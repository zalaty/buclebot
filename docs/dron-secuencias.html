<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sector — programa el dron</title>
<style>
  :root{
    --bg:#0E1116; --panel:#161B22; --panel2:#1B222C;
    --line:rgba(255,255,255,.07); --grid:rgba(255,255,255,.05);
    --ink:#E6EDF3; --muted:#8B98A5;
    --accent:#38E1C6; --accent-dim:rgba(56,225,198,.16);
    --goal:#6EE787; --hazard:#3A2A1C; --hazard-edge:#F0883E;
    --danger:#FF6B6B;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans)}
  body{min-height:100vh;display:flex;justify-content:center;padding:18px 14px 40px}
  .app{width:100%;max-width:480px}

  header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:4px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
  .lvl{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--muted)}
  h1{font-size:19px;font-weight:600;margin:2px 0 2px}
  .intro{font-size:13px;color:var(--muted);min-height:18px;margin-bottom:12px;line-height:1.5}

  .board-wrap{display:flex;justify-content:center;margin-bottom:14px}
  .board{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px}
  .grid{position:relative;display:grid}
  .cell{border:1px solid var(--grid);border-radius:6px}
  .cell.wall{background:var(--hazard);border-color:rgba(240,136,62,.32);
    background-image:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(240,136,62,.14) 5px,rgba(240,136,62,.14) 10px)}
  .cell.goal{border-color:rgba(110,231,135,.5)}
  .goal-mark{position:absolute;border-radius:8px;border:2px solid var(--goal);
    box-shadow:0 0 0 0 rgba(110,231,135,.45);animation:pulse 1.8s ease-out infinite;pointer-events:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(110,231,135,.5)}100%{box-shadow:0 0 0 12px rgba(110,231,135,0)}}

  .drone-wrap{position:absolute;top:0;left:0;transition:transform .26s cubic-bezier(.34,1.2,.5,1);pointer-events:none;z-index:2}
  .drone{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .2s ease}
  .drone svg{width:62%;height:62%;display:block;filter:drop-shadow(0 0 6px rgba(56,225,198,.55))}
  .drone.crash{animation:shake .32s linear}
  .drone.crash svg{filter:drop-shadow(0 0 8px rgba(255,107,107,.8));color:var(--danger)}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}

  .strip-head{display:flex;align-items:center;justify-content:space-between;margin:0 2px 6px}
  .strip-label{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .count{font-family:var(--mono);font-size:12px;color:var(--ink)}
  .count .par{color:var(--muted)}
  .strip{min-height:46px;display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px}
  .strip:empty::before{content:"Toca los comandos para trazar la ruta…";color:var(--muted);font-size:12.5px;font-style:italic}
  .chip{font-family:var(--mono);font-size:12px;display:inline-flex;align-items:center;gap:4px;
    padding:5px 8px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);color:var(--ink)}
  .chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

  .palette{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0 8px}
  .cmd{appearance:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink);
    background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:13px 6px;display:flex;
    flex-direction:column;align-items:center;gap:5px;transition:border-color .12s,transform .06s}
  .cmd:hover{border-color:var(--accent)}
  .cmd:active{transform:translateY(1px)}
  .cmd svg{width:22px;height:22px;color:var(--accent)}
  .cmd .k{font-family:var(--mono);font-size:10px;color:var(--muted)}

  .controls{display:grid;grid-template-columns:1fr auto auto;gap:8px}
  .btn{appearance:none;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:600;
    border-radius:11px;padding:12px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
    transition:border-color .12s,transform .06s}
  .btn:active{transform:translateY(1px)}
  .btn.run{background:var(--accent);border-color:var(--accent);color:#06231E}
  .btn.run:disabled{opacity:.45;cursor:not-allowed}
  .btn.ghost{color:var(--muted)}
  .btn.ghost:hover{color:var(--ink);border-color:var(--accent)}

  .toast{margin-top:10px;min-height:20px;font-size:12.5px;color:var(--accent);text-align:center;font-family:var(--mono)}
  .toast.warn{color:var(--hazard-edge)}

  .overlay{position:fixed;inset:0;background:rgba(8,10,13,.72);display:none;align-items:center;justify-content:center;padding:20px;z-index:9}
  .overlay.show{display:flex}
  .card{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;text-align:center}
  .medal{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
  .card h2{font-size:20px;margin:8px 0 4px}
  .card p{font-size:13.5px;color:var(--muted);line-height:1.55;margin:0 0 16px}
  .card .stat{font-family:var(--mono);color:var(--ink)}
  .card .btn.run{width:100%}
  .hint{margin-top:12px;font-size:12.5px;color:var(--hazard-edge);line-height:1.55;
    border-top:1px dashed var(--line);padding-top:12px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="eyebrow">Sector</span>
    <span class="lvl" id="lvlTag">Nivel 1 / 5</span>
  </header>
  <h1 id="title">Programa el dron</h1>
  <p class="intro" id="intro"></p>

  <div class="board-wrap">
    <div class="board" id="board">
      <div class="grid" id="grid"></div>
      <div class="goal-mark" id="goalMark"></div>
      <div class="drone-wrap" id="droneWrap"><div class="drone" id="drone">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:var(--accent)"><path d="M3 12 L20 4 L15 12 L20 20 Z"/></svg>
      </div></div>
    </div>
  </div>

  <div class="strip-head">
    <span class="strip-label">Programa</span>
    <span class="count"><span id="cmdCount">0</span> <span class="par">comandos · par <span id="parVal">4</span></span></span>
  </div>
  <div class="strip" id="strip"></div>

  <div class="palette">
    <button class="cmd" data-cmd="F">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      Avanzar <span class="k">avanzar()</span>
    </button>
    <button class="cmd" data-cmd="L">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 5 5v3"/></svg>
      Girar izq. <span class="k">girarIzq()</span>
    </button>
    <button class="cmd" data-cmd="R">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 0 0-5 5v3"/></svg>
      Girar der. <span class="k">girarDer()</span>
    </button>
  </div>

  <div class="controls">
    <button class="btn run" id="runBtn">Ejecutar ▸</button>
    <button class="btn ghost" id="undoBtn">Borrar último</button>
    <button class="btn ghost" id="resetBtn">Reiniciar</button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <div class="medal" id="medal">Ruta completada</div>
    <h2 id="cardTitle">¡Has llegado!</h2>
    <p id="cardBody"></p>
    <button class="btn run" id="nextBtn">Siguiente nivel</button>
    <div class="hint" id="cardHint" style="display:none"></div>
  </div>
</div>

<script>
const DIRS=[{x:0,y:-1},{x:1,y:0},{x:0,y:1},{x:-1,y:0}]; // 0 arriba,1 der,2 abajo,3 izq
const cellKey=(x,y)=>x+","+y;

const LEVELS=[
  {cols:5,rows:3,start:{x:0,y:1,dir:1},goal:{x:4,y:1},walls:[],par:4,
   intro:"Encadena comandos y dale a Ejecutar. La ruta corre entera de golpe: no puedes corregir a mitad."},
  {cols:4,rows:4,start:{x:0,y:3,dir:1},goal:{x:3,y:0},walls:[],par:7,
   intro:"Avanzar va en la dirección que mira el dron. Para subir, antes tendrás que girar."},
  {cols:5,rows:3,start:{x:0,y:1,dir:1},goal:{x:4,y:1},walls:[[2,1]],par:10,
   intro:"Hay un bloque en medio. Planéalo en tu cabeza antes de ejecutar: si chocas, vuelves al inicio."},
  {cols:5,rows:5,start:{x:0,y:4,dir:0},goal:{x:4,y:4},walls:[[1,1],[2,1],[3,1],[1,2],[2,2],[3,2],[1,3],[2,3],[3,3]],par:14,
   intro:"Rodea el edificio. Cuantos menos comandos uses, mejor: intenta igualar el par."},
  {cols:5,rows:5,start:{x:0,y:0,dir:1},goal:{x:4,y:4},
   open:[[0,0],[1,0],[2,0],[3,0],[4,0],[4,1],[0,2],[1,2],[2,2],[3,2],[4,2],[0,3],[0,4],[1,4],[2,4],[3,4],[4,4]],
   par:20,
   intro:"Un pasillo en zigzag. Toca repetir 'avanzar' muchas veces… fíjate en lo cansino que se vuelve.",
   outro:"¿Te has fijado? Has escrito «avanzar» una y otra vez. En el próximo mundo desbloquearás los BUCLES: decir «repite 4 veces» en lugar de copiar y pegar. Justo eso que acabas de echar de menos."}
];

let li=0, program=[], drone={x:0,y:0,dir:1}, cell=64, running=false;
const $=id=>document.getElementById(id);

function wallsOf(L){
  if(L.walls) return new Set(L.walls.map(w=>cellKey(w[0],w[1])));
  const open=new Set(L.open.map(o=>cellKey(o[0],o[1]))), s=new Set();
  for(let y=0;y<L.rows;y++)for(let x=0;x<L.cols;x++)if(!open.has(cellKey(x,y)))s.add(cellKey(x,y));
  return s;
}

function loadLevel(i){
  li=i; program=[]; running=false;
  const L=LEVELS[i];
  drone={...L.start};
  const maxW=Math.min(420,(document.querySelector('.app').clientWidth-16));
  cell=Math.max(40,Math.min(74,Math.floor(maxW/L.cols)));
  const walls=wallsOf(L);

  const grid=$('grid');
  grid.style.gridTemplateColumns=`repeat(${L.cols},${cell}px)`;
  grid.style.gridTemplateRows=`repeat(${L.rows},${cell}px)`;
  grid.style.gap='0px';
  grid.innerHTML='';
  for(let y=0;y<L.rows;y++)for(let x=0;x<L.cols;x++){
    const c=document.createElement('div'); c.className='cell';
    if(walls.has(cellKey(x,y)))c.classList.add('wall');
    if(x===L.goal.x&&y===L.goal.y)c.classList.add('goal');
    grid.appendChild(c);
  }
  const gm=$('goalMark');
  gm.style.width=gm.style.height=(cell-14)+'px';
  gm.style.left=(L.goal.x*cell+7)+'px'; gm.style.top=(L.goal.y*cell+7)+'px';

  const dw=$('droneWrap'); dw.style.width=dw.style.height=cell+'px';
  $('drone').classList.remove('crash');
  updateDrone(false);

  $('lvlTag').textContent=`Nivel ${i+1} / ${LEVELS.length}`;
  $('intro').textContent=L.intro;
  $('parVal').textContent=L.par;
  renderStrip(); setToast(''); 
}

function updateDrone(animate=true){
  const dw=$('droneWrap'), d=$('drone');
  dw.style.transition=animate?'':'none';
  d.style.transition=animate?'':'none';
  dw.style.transform=`translate(${drone.x*cell}px,${drone.y*cell}px)`;
  d.style.transform=`rotate(${(drone.dir-1)*90}deg)`;
  if(!animate){ void dw.offsetWidth; dw.style.transition=''; d.style.transition=''; }
}

function renderStrip(active=-1){
  const labels={F:'avanzar',L:'↺ izq',R:'↻ der'};
  $('strip').innerHTML=program.map((c,i)=>
    `<span class="chip${i===active?' active':''}">${labels[c]}</span>`).join('');
  $('cmdCount').textContent=program.length;
}
function setToast(t,warn=false){const el=$('toast');el.textContent=t;el.className='toast'+(warn?' warn':'');}

function add(c){ if(running)return; program.push(c); renderStrip(); setToast(''); }
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function run(){
  if(running||program.length===0)return;
  running=true; setButtons(true); setToast('Ejecutando ruta…');
  const L=LEVELS[li], walls=wallsOf(L);
  drone={...L.start}; updateDrone(false); await sleep(120);
  for(let i=0;i<program.length;i++){
    renderStrip(i);
    const c=program[i];
    if(c==='L'){drone.dir=(drone.dir+3)%4; updateDrone(); await sleep(230);}
    else if(c==='R'){drone.dir=(drone.dir+1)%4; updateDrone(); await sleep(230);}
    else{
      const nx=drone.x+DIRS[drone.dir].x, ny=drone.y+DIRS[drone.dir].y;
      const oob=nx<0||ny<0||nx>=L.cols||ny>=L.rows;
      if(oob||walls.has(cellKey(nx,ny))){ await crash(); return; }
      drone.x=nx; drone.y=ny; updateDrone(); await sleep(300);
      if(drone.x===L.goal.x&&drone.y===L.goal.y){ await win(); return; }
    }
  }
  renderStrip(-1);
  running=false; setButtons(false);
  setToast('La ruta termina lejos de la baliza. Ajústala.',true);
}

async function crash(){
  const d=$('drone'); d.classList.add('crash'); await sleep(360); d.classList.remove('crash');
  drone={...LEVELS[li].start}; updateDrone(false); renderStrip(-1);
  running=false; setButtons(false);
  setToast('💥 Choque. Vuelves al inicio — revisa tu plan.',true);
}

async function win(){
  await sleep(260);
  const L=LEVELS[li], used=program.length, ok=used<=L.par;
  $('medal').textContent=ok?'Ruta óptima ✦':'Ruta completada';
  $('cardTitle').textContent=ok?'¡Limpio!':'¡Has llegado!';
  $('cardBody').innerHTML=`Lo resolviste en <span class="stat">${used}</span> comandos · par <span class="stat">${L.par}</span>.`+
    (ok?' Has igualado o batido el óptimo.':' ¿Puedes hacerlo con menos?');
  const hint=$('cardHint');
  if(L.outro){ hint.style.display='block'; hint.textContent=L.outro;
    $('nextBtn').textContent='Reiniciar mundo'; }
  else { hint.style.display='none'; $('nextBtn').textContent='Siguiente nivel'; }
  $('overlay').classList.add('show');
  running=false; setButtons(false);
}

function setButtons(dis){ $('runBtn').disabled=dis; }

document.querySelectorAll('.cmd').forEach(b=>b.onclick=()=>add(b.dataset.cmd));
$('runBtn').onclick=run;
$('undoBtn').onclick=()=>{ if(running)return; program.pop(); renderStrip(); };
$('resetBtn').onclick=()=>{ if(running)return; loadLevel(li); };
$('nextBtn').onclick=()=>{ $('overlay').classList.remove('show'); loadLevel((li+1)%LEVELS.length); };
window.addEventListener('resize',()=>{ if(!running)loadLevel(li); });

loadLevel(0);
</script>
</body>
</html>
